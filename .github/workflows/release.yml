# Changesets release flow, matching jspsych/jspsych-multiplayer: this workflow
# only opens/updates the "Version Packages" pull request. Publishing to npm is
# handled separately by publish.yml, which uses npm trusted publishing (OIDC)
# and therefore needs a dedicated job with `id-token: write` and no long-lived
# NPM_TOKEN.
#
# Requires, under Settings → Actions → General,
# "Allow GitHub Actions to create and approve pull requests".

name: release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    name: Create Release Pull Request
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build packages
        run: npm run build:packages

      - name: Build example site
        run: npm run build:example

      - name: Create Release Pull Request
        uses: changesets/action@v1
        with:
          version: npm run changeset:version
          commit: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
